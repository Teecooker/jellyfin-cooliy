services:
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    command: ["serve"]
    # Keine env_file mehr, da wir config.yaml nutzen
    volumes:
      - ./data:/data                # Persistente Daten
      - ./config.yaml:/etc/headscale/config.yaml:ro  # Config readonly mounten
    cap_add:
      - NET_BIND_SERVICE