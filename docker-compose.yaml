services:
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    command: ["serve", "--config", "/etc/headscale/config.yaml"]
    volumes:
      - ./data:/data
      - ./config.yaml:/etc/headscale/config.yaml:ro
    cap_add:
      - NET_BIND_SERVICE