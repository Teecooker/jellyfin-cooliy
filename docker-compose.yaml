services:
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    command: ["serve"]  # WICHTIG: Startet den Server
    env_file:
      - headscale.env   # Enthält alle Konfigurationsvariablen
    volumes:
      - ./data:/data    # Für Datenbank und Schlüssel
    cap_add:
      - NET_BIND_SERVICE
    # Keine ports: - Coolify routet automatisch über die Domain